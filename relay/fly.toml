# Calisthenics Roulette group-workout relay.
# Auto-stop/auto-start: the machine sleeps when no group is active, so the
# only steady cost is rootfs storage (~pennies/month). WS connections wake it.
app = "calisthenics-relay"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
