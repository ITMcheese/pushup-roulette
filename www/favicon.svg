<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Calisthenics Roulette brand mark: slot-reel + neon barbell -->
  <rect width="64" height="64" rx="14" fill="#0a0a0f"/>
  <!-- dim reel rows -->
  <rect x="12" y="8" width="40" height="9" rx="3" fill="#ffffff" opacity="0.06"/>
  <rect x="12" y="47" width="40" height="9" rx="3" fill="#ffffff" opacity="0.06"/>
  <!-- winning row -->
  <rect x="9" y="20" width="46" height="24" rx="6" fill="none" stroke="#00ff88" stroke-width="2.5"/>
  <!-- barbell -->
  <rect x="24" y="30" width="16" height="4" rx="2" fill="#00ff88"/>
  <rect x="19" y="25" width="4" height="14" rx="2" fill="#00ff88"/>
  <rect x="14.5" y="27.5" width="3" height="9" rx="1.5" fill="#00ff88"/>
  <rect x="41" y="25" width="4" height="14" rx="2" fill="#00ff88"/>
  <rect x="46.5" y="27.5" width="3" height="9" rx="1.5" fill="#00ff88"/>
</svg>
