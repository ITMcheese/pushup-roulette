# ──────────────────────────────────────────────────────────────────────────
# ONE-TIME SETUP for external TestFlight to work (founder action required)
# ──────────────────────────────────────────────────────────────────────────
# This pipeline reuses a STABLE distribution certificate across every build.
# Previously the YAML generated a new RSA key + revoked the old cert on every
# build (a hack to dodge Apple's 3-cert limit), which made every build sign
# with a different key. Apple's beta-review process rejects that with
# ITMS-90035 Invalid Signature, blocking external TestFlight.
#
# For the new flow to work, the founder must set ONE secure env var in
# Codemagic's UI (this only needs to be done once):
#
#   1. Codemagic UI → Apps → Calisthenics Roulette → Environment variables
#   2. Add variable:
#        Name:   CERTIFICATE_PRIVATE_KEY
#        Value:  the contents of a 2048-bit RSA private key in PEM format
#                (start with -----BEGIN RSA PRIVATE KEY-----)
#        Group:  default
#        Secure: ON  (so it persists encrypted and never logs)
#   3. Generate the key locally with:
#        openssl genrsa 2048 > my-distribution-key.pem
#      Paste the entire file contents (including BEGIN/END lines).
#
# After that's set, every push to main reuses the same cert. If Apple already
# has an active distribution cert tied to a DIFFERENT key, revoke it ONCE in
# App Store Connect (Certificates, IDs & Profiles), then trigger a build —
# fetch-signing-files --create will create a fresh cert against the stable
# key and use it forever after.
# ──────────────────────────────────────────────────────────────────────────

workflows:
  ios-capacitor-workflow:
    name: Calisthenics Roulette iOS Build
    max_build_duration: 120
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Codemagic
    environment:
      vars:
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
        BUNDLE_ID: "com.bodyweight.roulette"
      node: v20
      xcode: latest
      cocoapods: default
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
          source: true
    scripts:
      - name: Install dependencies
        script: |
          npm install
      - name: Sync Capacitor assets
        script: |
          npx cap sync ios
      - name: Install CocoaPods dependencies
        script: |
          cd ios/App && pod install
      - name: Verify stable distribution key is configured
        script: |
          if [ -z "$CERTIFICATE_PRIVATE_KEY" ]; then
            echo "❌ CERTIFICATE_PRIVATE_KEY is not set."
            echo "   External TestFlight needs a stable signing cert."
            echo "   See the comment at the top of codemagic.yaml for setup."
            exit 1
          fi
          echo "✅ Stable distribution key found."
      - name: Fetch signing files
        script: |
          # Reuses the same distribution cert across every build (needed for
          # external TestFlight). --create only creates a new cert if none
          # exists yet for this account/bundle; once one exists it's reused.
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --certificate-key="$CERTIFICATE_PRIVATE_KEY" \
            --create
      - name: Set up keychain
        script: |
          keychain initialize
      - name: Add certificates to keychain
        script: |
          keychain add-certificates
      - name: Set up code signing settings on Xcode project
        script: |
          xcode-project use-profiles
      - name: Set incrementing build number
        script: |
          # Apple requires every uploaded build to have a higher CFBundleVersion
          # than the last. Use Codemagic's ever-incrementing build index
          # (fallback: a timestamp) so uploads never collide again.
          BUILD_NUM=${BUILD_NUMBER:-$(date +%s)}
          echo "Setting CFBundleVersion (CURRENT_PROJECT_VERSION) to $BUILD_NUM"
          cd ios/App
          sed -i '' "s/CURRENT_PROJECT_VERSION = [0-9.]*;/CURRENT_PROJECT_VERSION = ${BUILD_NUM};/g" App.xcodeproj/project.pbxproj
          grep -n "CURRENT_PROJECT_VERSION" App.xcodeproj/project.pbxproj
      - name: Build ipa for distribution
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        beta_groups:
          - External Roulette Testers
