# ──────────────────────────────────────────────────────────────────────────
# SIGNING: uses the TEAM-WIDE SHARED distribution certificate (2026-07-19)
# ──────────────────────────────────────────────────────────────────────────
# Every app on Apple team J93K5FJFQ8 signs with ONE shared distribution
# certificate: SMYR267643 (serial 59F1B27C10BF2C7EDDCCC98D257D4CC8). Its
# private key is held by EAS (Sage + Mortgage Math build with it), by grams'
# GitHub CI, and locally at C:\Users\kojo\.apple-certs\shared-dist-key.pem.
# Per-app certificates are gone: Apple's team cert quota kept filling up and
# forced revocations that broke sibling apps' CI (2026-06-28, 2026-07-16).
#
# This app's OLD per-app cert was revoked in the 2026-07-16 churn, so the
# founder must update ONE secure env var in Codemagic before the next build:
#
#   1. Codemagic UI → Apps → Calisthenics Roulette → Environment variables
#   2. Edit CERTIFICATE_PRIVATE_KEY (group "YAML", Secure: ON) and replace
#      its value with the FULL contents of
#        C:\Users\kojo\.apple-certs\shared-dist-key.pem
#      (open in Notepad, Ctrl+A, Ctrl+C, paste — include BEGIN/END lines).
#
# With that key, fetch-signing-files below MATCHES the shared cert and never
# creates a new one. Never revoke any distribution certificate on this team
# without confirming no app signs with it.
# ──────────────────────────────────────────────────────────────────────────

workflows:
  ios-capacitor-workflow:
    name: Calisthenics Roulette iOS Build
    max_build_duration: 120
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Codemagic
    environment:
      groups:
        - YAML        # holds CERTIFICATE_PRIVATE_KEY (the stable distribution key)
      vars:
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
        BUNDLE_ID: "com.bodyweight.roulette"
      node: v20
      xcode: latest
      cocoapods: default
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
          source: true
    scripts:
      - name: Install dependencies
        script: |
          npm install
      - name: Sync Capacitor assets
        script: |
          npx cap sync ios
      - name: Install CocoaPods dependencies
        script: |
          cd ios/App && pod install
      - name: Verify stable distribution key is configured
        script: |
          # Print everything Claude needs to diagnose the env-var scope without
          # ever echoing the secret value itself.
          echo "──────── ENV DIAGNOSTICS ────────"
          echo "Total env vars: $(env | wc -l)"
          echo ""
          echo "Env var NAMES (sorted, values omitted):"
          env | cut -d= -f1 | sort
          echo ""
          echo "Looking for any var that might be a misnamed cert key:"
          env | cut -d= -f1 | grep -i -E '(cert|key|private|signing|distrib)' || echo "  (no matches)"
          echo ""
          echo "── target var status ──"
          if [ -n "$CERTIFICATE_PRIVATE_KEY" ]; then
            echo "✅ CERTIFICATE_PRIVATE_KEY is set."
            echo "   Length: ${#CERTIFICATE_PRIVATE_KEY} chars"
            echo "   First 30 chars: ${CERTIFICATE_PRIVATE_KEY:0:30}"
            echo "   Last 30 chars: ${CERTIFICATE_PRIVATE_KEY: -30}"
            # Sanity: does it look like a PEM?
            if echo "$CERTIFICATE_PRIVATE_KEY" | grep -q "BEGIN.*PRIVATE KEY"; then
              echo "   ✅ Looks like a PEM private key."
            else
              echo "   ⚠️ Does not contain 'BEGIN ... PRIVATE KEY' — value may be malformed."
            fi
            echo "─────────────────────────────────"
          else
            echo "❌ CERTIFICATE_PRIVATE_KEY is NOT visible to this workflow."
            echo ""
            echo "If you see a similarly-named var in the list above, the name doesn't match."
            echo "If you see NO cert-related vars, the variable is saved in a scope this"
            echo "workflow can't see (most commonly: an environment group not referenced"
            echo "by 'environment.groups:' in this YAML, or saved at the team-personal"
            echo "level instead of the app level)."
            echo ""
            echo "Paste the full log above to Claude and a one-line fix will follow."
            echo "─────────────────────────────────"
            exit 1
          fi
      - name: Fetch signing files
        script: |
          # Reuses the same distribution cert across every build (needed for
          # external TestFlight). --create only creates a new cert if none
          # exists yet for this account/bundle; once one exists it's reused.
          # The @env: syntax tells codemagic-cli-tools to read the multiline
          # PEM straight from the env var (more robust than shell expansion).
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --certificate-key=@env:CERTIFICATE_PRIVATE_KEY \
            --create
      - name: Set up keychain
        script: |
          keychain initialize
      - name: Add certificates to keychain
        script: |
          keychain add-certificates
      - name: Set up code signing settings on Xcode project
        script: |
          xcode-project use-profiles
      - name: Set incrementing build number
        script: |
          # Apple requires every uploaded build to have a higher CFBundleVersion
          # than the last. Use Codemagic's ever-incrementing build index
          # (fallback: a timestamp) so uploads never collide again.
          BUILD_NUM=${BUILD_NUMBER:-$(date +%s)}
          echo "Setting CFBundleVersion (CURRENT_PROJECT_VERSION) to $BUILD_NUM"
          cd ios/App
          sed -i '' "s/CURRENT_PROJECT_VERSION = [0-9.]*;/CURRENT_PROJECT_VERSION = ${BUILD_NUM};/g" App.xcodeproj/project.pbxproj
          grep -n "CURRENT_PROJECT_VERSION" App.xcodeproj/project.pbxproj
      - name: Build ipa for distribution
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        beta_groups:
          - External Roulette Testers
