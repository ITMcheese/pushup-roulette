workflows:
  ios-capacitor-workflow:
    name: Bodyweight Workout Roulette iOS Build
    max_build_duration: 120
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Codemagic
    environment:
      vars:
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
        BUNDLE_ID: "com.bodyweight.roulette"
      node: v20
      xcode: latest
      cocoapods: default
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
          source: true
    scripts:
      - name: Install dependencies
        script: |
          npm install
      - name: Sync Capacitor assets
        script: |
          npx cap sync ios
      - name: Install CocoaPods dependencies
        script: |
          cd ios/App && pod install
      - name: Set up certificate private key
        script: |
          openssl genrsa 2048 2>/dev/null | tee /tmp/cert_key.pem
          echo "CERTIFICATE_PRIVATE_KEY<<DELIMITER" >> $CM_ENV
          cat /tmp/cert_key.pem >> $CM_ENV
          echo "DELIMITER" >> $CM_ENV
      - name: Revoke old distribution certificates
        script: |
          python3 << 'PYEOF'
          import jwt, time, os, json, urllib.request, ssl

          key_id = os.environ.get('APP_STORE_CONNECT_KEY_IDENTIFIER', '')
          issuer_id = os.environ.get('APP_STORE_CONNECT_ISSUER_ID', '')
          private_key = os.environ.get('APP_STORE_CONNECT_PRIVATE_KEY', '')

          if not all([key_id, issuer_id, private_key]):
              print("App Store Connect credentials not found, skipping revocation")
              exit(0)

          payload = {
              'iss': issuer_id,
              'iat': int(time.time()),
              'exp': int(time.time()) + 1200,
              'aud': 'appstoreconnect-v1'
          }
          token = jwt.encode(payload, private_key, algorithm='ES256', headers={'kid': key_id})

          headers = {'Authorization': f'Bearer {token}', 'Content-Type': 'application/json'}
          ctx = ssl.create_default_context()

          # List iOS Distribution certificates
          url = 'https://api.appstoreconnect.apple.com/v1/certificates?filter[certificateType]=IOS_DISTRIBUTION'
          req = urllib.request.Request(url, headers=headers)
          resp = urllib.request.urlopen(req, context=ctx)
          data = json.loads(resp.read())

          certs = data.get('data', [])
          print(f"Found {len(certs)} iOS Distribution certificate(s)")

          for cert in certs:
              cert_id = cert['id']
              print(f"Revoking certificate {cert_id}...")
              del_req = urllib.request.Request(
                  f'https://api.appstoreconnect.apple.com/v1/certificates/{cert_id}',
                  method='DELETE',
                  headers=headers
              )
              try:
                  urllib.request.urlopen(del_req, context=ctx)
                  print(f"  Revoked {cert_id}")
              except Exception as e:
                  print(f"  Warning: could not revoke {cert_id}: {e}")

          print("Certificate cleanup complete")
          PYEOF
      - name: Fetch signing files
        script: |
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create
      - name: Set up keychain
        script: |
          keychain initialize
      - name: Add certificates to keychain
        script: |
          keychain add-certificates
      - name: Set up code signing settings on Xcode project
        script: |
          xcode-project use-profiles
      - name: Build ipa for distribution
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        beta_groups:
          - External Testers
