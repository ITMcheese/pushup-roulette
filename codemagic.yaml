workflows:
  ios-capacitor-workflow:
    name: Bodyweight Workout Roulette iOS Build
    max_build_duration: 120
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Codemagic
    environment:
      vars:
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
        BUNDLE_ID: "com.bodyweight.roulette"
      node: v20
      xcode: latest
      cocoapods: default
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
          source: true
    scripts:
      - name: Install dependencies
        script: |
          npm install
      - name: Sync Capacitor assets
        script: |
          npx cap sync ios
      - name: Install CocoaPods dependencies
        script: |
          cd ios/App && pod install
      - name: Set up certificate private key
        script: |
          openssl genrsa 2048 2>/dev/null | tee /tmp/cert_key.pem
          echo "CERTIFICATE_PRIVATE_KEY<<DELIMITER" >> $CM_ENV
          cat /tmp/cert_key.pem >> $CM_ENV
          echo "DELIMITER" >> $CM_ENV
      - name: Revoke old distribution certificates
        script: |
          python3 << 'PYEOF'
          import os, json, urllib.request, ssl, time, jwt

          key_id = os.environ.get('APP_STORE_CONNECT_KEY_IDENTIFIER', '')
          issuer_id = os.environ.get('APP_STORE_CONNECT_ISSUER_ID', '')

          # Read the .p8 key file directly (Codemagic stores it here)
          key_path = os.path.expanduser(f'~/private_keys/AuthKey_{key_id}.p8')
          if not os.path.exists(key_path):
              print(f"Key file not found at {key_path}, skipping")
              exit(0)

          with open(key_path, 'r') as f:
              private_key = f.read()

          print(f"Key ID: {key_id}, Key file loaded ({len(private_key)} bytes)")

          token = jwt.encode(
              {'iss': issuer_id, 'iat': int(time.time()),
               'exp': int(time.time()) + 1200, 'aud': 'appstoreconnect-v1'},
              private_key, algorithm='ES256', headers={'kid': key_id}
          )

          headers = {'Authorization': f'Bearer {token}', 'Content-Type': 'application/json'}
          ctx = ssl.create_default_context()

          for cert_type in ['DISTRIBUTION', 'IOS_DISTRIBUTION']:
              url = f'https://api.appstoreconnect.apple.com/v1/certificates?filter[certificateType]={cert_type}'
              req = urllib.request.Request(url, headers=headers)
              try:
                  resp = urllib.request.urlopen(req, context=ctx)
                  data = json.loads(resp.read())
              except Exception as e:
                  print(f"Error listing {cert_type}: {e}")
                  continue

              certs = data.get('data', [])
              print(f"Found {len(certs)} {cert_type} certificate(s)")

              for cert in certs:
                  cert_id = cert['id']
                  print(f"Revoking certificate {cert_id}...")
                  del_req = urllib.request.Request(
                      f'https://api.appstoreconnect.apple.com/v1/certificates/{cert_id}',
                      method='DELETE', headers=headers)
                  try:
                      urllib.request.urlopen(del_req, context=ctx)
                      print(f"  Revoked {cert_id}")
                  except Exception as e:
                      print(f"  Warning: {e}")

          print("Certificate cleanup complete")
          PYEOF
      - name: Fetch signing files
        script: |
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create
      - name: Set up keychain
        script: |
          keychain initialize
      - name: Add certificates to keychain
        script: |
          keychain add-certificates
      - name: Set up code signing settings on Xcode project
        script: |
          xcode-project use-profiles
      - name: Build ipa for distribution
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        beta_groups:
          - External Testers
